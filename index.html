<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinh Danh</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* INPUT */
#inputScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #111;
}

/* HONOR */
#honorScreen {
  display: none;
  height: 100vh;
  background: url('nen1.jpg') no-repeat center center/cover;
  position: relative;
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* 🔦 SPOTLIGHT */
.spotlight {
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 800px;

  background: radial-gradient(
    ellipse at center,
    rgba(255, 215, 0, 0.5) 0%,
    rgba(255, 215, 0, 0.2) 30%,
    rgba(255, 215, 0, 0.05) 60%,
    transparent 80%
  );

  filter: blur(20px);
  animation: lightMove 3s ease-in-out infinite alternate;
}

@keyframes lightMove {
  0% { transform: translateX(-55%) scale(1); }
  50% { transform: translateX(-45%) scale(1.1); }
  100% { transform: translateX(-55%) scale(1); }
}

/* 🎯 CENTER CHUẨN */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
}

/* AVATAR */
.avatar {
  width: 200px;
  height: 360px;
  border-radius: 50%;
  border: 6px solid gold;
  box-shadow: 0 0 60px gold;
  margin-bottom: 20px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 20px gold; }
  to { box-shadow: 0 0 80px gold; }
}

/* TEXT */
.name {
  font-size: clamp(18px, 4vw, 32px);
  font-weight: bold;
  text-shadow: 0 0 20px gold;
}

.title {
  ffont-size: clamp(22px, 5vw, 42px);
  margin-top: 10px;
}

.reward {
  font-size: clamp(16px, 3.5vw, 28px);
  margin-top: 8px;
  color: #ffd700;
}

/* INPUT */
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

/* EFFECT */
.fadeIn {
  animation: fadeIn 1s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- INPUT -->
<div id="inputScreen">
  <h2>🎯 Nhập tên của bạn</h2>
  <input id="name" placeholder="Tên của bạn">
  <button onclick="start()">BẮT ĐẦU</button>
</div>

<!-- HONOR -->
<div id="honorScreen">
  <div class="overlay"></div>
  <div class="spotlight"></div>

  <div class="container">
    <img id="avatar" class="avatar">
    <div id="text"></div>
  </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>

let data = {};

// LOAD GOOGLE SHEET
async function loadData() {

  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVauF5Yc50nuFu26X_7P3LeZKLVb3WFAJYycWhJSSYxEjkk6rG3fj8BUCIwyn8_pVLhvSwV2a1NDwl/pub?output=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split(/\r?\n/).slice(1);

  rows.forEach(row => {
    if (!row.trim()) return;

    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    let name = cols[0]?.trim().toLowerCase();
    let title = cols[1]?.trim();
    let reward = cols[2]?.trim();
    let img = cols[3]?.trim();

    if (!data[name]) data[name] = [];

    data[name].push({ title, reward, img });
  });
}

loadData();


// START
async function start() {

  let raw = document.getElementById("name").value.trim();
  let name = raw.toLowerCase();

  if (!name) return alert("Nhập tên!");

  document.getElementById("inputScreen").style.display = "none";
  document.getElementById("honorScreen").style.display = "block";

  let avatar = document.getElementById("avatar");
  let text = document.getElementById("text");

  // không có dữ liệu
  if (!data[name]) {

    avatar.style.display = "none";

    text.innerHTML = `
      <div class="name fadeIn">✨ ${raw.toUpperCase()} ✨</div>
      <div class="reward fadeIn">Hãy tiếp tục cố gắng nhé!</div>
    `;

    startFirework();
    document.getElementById("music").play();
    return;
  }

  avatar.style.display = "block";
  avatar.src = data[name][0].img;

  document.getElementById("music").play();

  for (let i = 0; i < data[name].length; i++) {

    let item = data[name][i];

    await new Promise(resolve => {

      setTimeout(() => {

        text.innerHTML = `
          <div class="name fadeIn">✨ ${raw.toUpperCase()} ✨</div>
          <div class="title fadeIn">${item.title}</div>
          <div class="reward fadeIn">💰 ${item.reward}</div>
        `;

        startFirework();
        resolve();

      }, 800);
    });

    await new Promise(r => setTimeout(r, 2500));
  }
}


// FIREWORK
let fireworkInterval;

function startFirework() {

  if (fireworkInterval) return;

  fireworkInterval = setInterval(() => {

    confetti({ particleCount: 8, angle: 60, origin: { x: 0, y: 1 } });
    confetti({ particleCount: 8, angle: 120, origin: { x: 1, y: 1 } });
    confetti({ particleCount: 8, angle: 300, origin: { x: 0, y: 0 } });
    confetti({ particleCount: 8, angle: 240, origin: { x: 1, y: 0 } });

  }, 600);

  setTimeout(() => clearInterval(fireworkInterval), 5000);
}

</script>

</body>
</html>
