<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinh Danh Cinematic</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at center, #020617, #000);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* PARTICLE nền */
.bg-particles span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255,255,255,0.6);
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* CONTAINER */
.container {
  text-align: center;
  position: relative;
  opacity: 0;
  transform: scale(0.8);
  animation: intro 1.5s ease forwards;
  animation-delay: 0.5s;
}

@keyframes intro {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* SPOTLIGHT quét */
.spotlight {
  position: absolute;
  top: -250px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 500px;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.25), transparent);
  filter: blur(60px);
  animation: sweep 4s infinite alternate;
}

@keyframes sweep {
  0% { transform: translateX(-60%) rotate(-5deg); }
  100% { transform: translateX(-40%) rotate(5deg); }
}

/* AVATAR */
.avatar-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  margin: auto;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 5px solid gold;
  object-fit: cover;
  position: relative;
  z-index: 2;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px gold; }
  50% { box-shadow: 0 0 40px gold; }
}

/* RING xoay */
.ring {
  position: absolute;
  top: -15px;
  left: -15px;
  width: 230px;
  height: 230px;
  border-radius: 50%;
  border: 2px dashed gold;
  animation: spin 6s linear infinite;
}

.line {
  position: absolute;
  top: -15px;
  left: -15px;
  width: 230px;
  height: 230px;
  border-radius: 50%;
  border-top: 2px solid cyan;
  animation: spin 3s linear infinite reverse;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* TEXT */
.name {
  font-size: 26px;
  margin-top: 25px;
  font-weight: bold;
  opacity: 0;
  transform: translateY(20px);
  animation: textUp 1s forwards;
  animation-delay: 1.2s;
}

.title {
  font-size: 18px;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 1.8s;
}

@keyframes textUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  to { opacity: 0.9; }
}

/* MOBILE */
@media (max-width: 480px) {
  .avatar-wrapper {
    width: 150px;
    height: 150px;
  }

  .ring, .line {
    width: 180px;
    height: 180px;
  }

  .name {
    font-size: 20px;
  }

  .title {
    font-size: 14px;
  }
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="bg-particles" id="particles"></div>

<div class="container">
  <div class="spotlight"></div>

  <div class="avatar-wrapper">
    <div class="ring"></div>
    <div class="line"></div>
    <img src="avatar.jpg" class="avatar">
  </div>

  <div class="name">NGUYỄN VĂN A</div>
  <div class="title">TOP XUẤT SẮC</div>
</div>

<script>
/* PARTICLE nền */
const particleContainer = document.getElementById("particles");

for (let i = 0; i < 60; i++) {
  let span = document.createElement("span");
  span.style.left = Math.random() * 100 + "vw";
  span.style.animationDuration = (5 + Math.random() * 5) + "s";
  particleContainer.appendChild(span);
}

/* FIREWORK theo nhịp */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.speedX = (Math.random() - 0.5) * 8;
    this.speedY = (Math.random() - 0.5) * 8;
    this.life = 100;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, 2, 2);
  }
}

function fireworkBurst() {
  let x = canvas.width / 2;
  let y = canvas.height / 3;

  let color = `hsl(${Math.random()*360},100%,60%)`;

  for (let i = 0; i < 100; i++) {
    particles.push(new Particle(x, y, color));
  }
}

/* bắn theo nhịp cinematic */
setInterval(fireworkBurst, 1500);

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
