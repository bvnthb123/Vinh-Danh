<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinh Danh</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* INPUT */
#inputScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #111;
}

input {
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

/* HONOR */
#honorScreen {
  display: none;
  height: 100vh;
  background: url('nen1.jpg') no-repeat center center/cover;
  text-align: center;
  position: relative;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

#honorScreen {
  display: none;
  height: 100vh;
  background: url('nen1.jpg') no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* AVATAR */
.avatar {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 6px solid gold;
  box-shadow: 0 0 40px gold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 20px gold; }
  to { box-shadow: 0 0 80px gold; }
}

/* NAME */
.name {
  font-size: 34px;
  font-weight: bold;
  text-shadow: 0 0 15px gold;
  margin-bottom: 15px;
}

/* TITLE */
.title {
  font-size: 40px;
  font-weight: bold;
}

/* REWARD */
.reward {
  font-size: 28px;
  margin-top: 10px;
  color: #ffd700;
}

/* EFFECT */
.fadeIn {
  animation: fadeIn 1s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="inputScreen">
  <h2>🎯 Nhập tên của bạn</h2>
  <input id="name" placeholder="Tên của bạn">
  <button onclick="start()">BẮT ĐẦU</button>
</div>

<div id="honorScreen">
  <div class="overlay"></div>

  <div class="content">
    <img id="avatar" class="avatar">
    <div id="text"></div>
  </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>

let data = {};

// 🔥 LOAD GOOGLE SHEET
async function loadData() {

  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVauF5Yc50nuFu26X_7P3LeZKLVb3WFAJYycWhJSSYxEjkk6rG3fj8BUCIwyn8_pVLhvSwV2a1NDwl/pub?output=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split(/\r?\n/).slice(1);

  rows.forEach(row => {
    if (!row.trim()) return;

    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    let name = cols[0]?.trim().toLowerCase();
    let title = cols[1]?.trim();
    let reward = cols[2]?.trim();
    let img = cols[3]?.trim();

    if (!data[name]) data[name] = [];

    data[name].push({
      title,
      reward,
      img
    });

  });

  console.log("DATA:", data);
}

loadData();


// 🚀 START
async function start() {

  let raw = document.getElementById("name").value.trim();
  let name = raw.toLowerCase();

  if (!name) return alert("Nhập tên!");

  document.getElementById("inputScreen").style.display = "none";
  document.getElementById("honorScreen").style.display = "block";

  let avatar = document.getElementById("avatar");
  let text = document.getElementById("text");

  // ❌ không có dữ liệu
  if (!data[name]) {

    avatar.style.display = "none";

    text.innerHTML = `
      <div class="name fadeIn">
        ✨ ${raw.toUpperCase()} ✨
      </div>
      <div class="reward fadeIn">
        Hãy tiếp tục cố gắng nhé!
      </div>
    `;

    startFirework();
    document.getElementById("music").play();
    return;
  }

  avatar.style.display = "block";
  avatar.src = data[name][0].img;

  document.getElementById("music").play();

  // 🎬 HIỆN TỪNG DANH HIỆU
  for (let i = 0; i < data[name].length; i++) {

    let item = data[name][i];

    await new Promise(resolve => {

      setTimeout(() => {

        text.innerHTML = `
          <div class="name fadeIn">
            ✨ ${raw.toUpperCase()} ✨
          </div>

          <div class="title fadeIn">
            ${item.title}
          </div>

          <div class="reward fadeIn">
            💰 ${item.reward}
          </div>
        `;

        startFirework();
        resolve();

      }, 1000);
    });

    await new Promise(r => setTimeout(r, 2500));
  }
}


// 🎆 FIREWORK
let fireworkInterval;

function startFirework() {

  if (fireworkInterval) return;

  fireworkInterval = setInterval(() => {

    confetti({ particleCount: 8, angle: 60, spread: 70, origin: { x: 0, y: 1 } });
    confetti({ particleCount: 8, angle: 120, spread: 70, origin: { x: 1, y: 1 } });
    confetti({ particleCount: 8, angle: 300, spread: 70, origin: { x: 0, y: 0 } });
    confetti({ particleCount: 8, angle: 240, spread: 70, origin: { x: 1, y: 0 } });

  }, 600);

  setTimeout(() => clearInterval(fireworkInterval), 5000);
}

</script>

</body>
</html>
