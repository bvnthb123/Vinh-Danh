<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinh Danh</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at center, #0b1a3a, #020617);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Container */
.container {
  text-align: center;
  position: relative;
}

/* Ánh sáng từ trên */
.light {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 400px;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.25), transparent);
  filter: blur(40px);
  animation: lightMove 3s infinite alternate;
}

@keyframes lightMove {
  from { opacity: 0.4; transform: translateX(-50%) scale(1); }
  to { opacity: 0.8; transform: translateX(-50%) scale(1.2); }
}

/* Ảnh vinh danh */
.avatar-wrapper {
  position: relative;
  width: 180px;
  height: 180px;
  margin: auto;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 4px solid gold;
  object-fit: cover;
  z-index: 2;
  position: relative;
}

/* Vòng sáng xoay */
.ring {
  position: absolute;
  top: -10px;
  left: -10px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px dashed rgba(255, 215, 0, 0.6);
  animation: spin 6s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Line ánh sáng bay */
.line {
  position: absolute;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top: 2px solid cyan;
  animation: spin 3s linear infinite reverse;
}

/* Text */
.name {
  font-size: 22px;
  margin-top: 20px;
  font-weight: bold;
}

.title {
  font-size: 16px;
  opacity: 0.8;
}

/* Mobile fix */
@media (max-width: 480px) {
  .avatar-wrapper {
    width: 140px;
    height: 140px;
  }

  .ring, .line {
    width: 160px;
    height: 160px;
  }

  .name {
    font-size: 18px;
  }

  .title {
    font-size: 14px;
  }
}

/* Canvas pháo hoa */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <div class="light"></div>

  <div class="avatar-wrapper">
    <div class="ring"></div>
    <div class="line"></div>
    <img src="avatar.jpg" class="avatar">
  </div>

  <div class="name">NGUYỄN VĂN A</div>
  <div class="title">TOP XUẤT SẮC</div>
</div>

<script>
/* FIREWORKS */
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.speedX = (Math.random() - 0.5) * 6;
    this.speedY = (Math.random() - 0.5) * 6;
    this.life = 100;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, 2, 2);
  }
}

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  let color = `hsl(${Math.random() * 360},100%,50%)`;

  for (let i = 0; i < 80; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

setInterval(createFirework, 800);
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
