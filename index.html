<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINH DANH</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  height: 100dvh; /* chuẩn mobile */
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  z-index: 10;
}

/* INPUT */
#inputScreen {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* MAIN */
#honorScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: url('nen1.jpg') center/cover no-repeat;
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

/* spotlight */
.spotlight {
  position: absolute;
  width: 600px;
  height: 900px;
  left: 50%;
  top: -20%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,215,0,0.4), transparent 70%);
  filter: blur(30px);
  animation: moveLight 4s infinite alternate;
}

@keyframes moveLight {
  from { transform: translateX(-60%) scale(1); }
  to { transform: translateX(-40%) scale(1.2); }
}

/* particles */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity:0; }
  to { transform: translateY(-10vh); opacity:1; }
}

/* center */
.container {
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  text-align: center;
  width: 90%;
  transition: 0.6s;
}

.container.show {
  transform: translate(-50%, -50%) scale(1);
}

/* 🔥 AVATAR TRÒN KHÔNG BỊ CẮT */
.avatarWrap {
  width: clamp(180px, 50vw, 260px);
  height: clamp(180px, 50vw, 260px);
  margin: auto;
  border-radius: 50%;
  border: 6px solid gold;
  box-shadow: 0 0 60px gold, 0 0 120px rgba(255,215,0,0.4);
  overflow: hidden;
  background: white;
}

.avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top; /* 🔥 không cắt đầu */
}

/* text */
.name {
  font-size: clamp(26px, 6vw, 44px);
  font-weight: bold;
  margin-top: 20px;
  word-break: break-word;
}

.title {
  font-size: clamp(18px, 4.5vw, 28px);
  margin-top: 8px;
}

.reward {
  font-size: clamp(16px, 4vw, 24px);
  color: gold;
}

/* animation */
@keyframes fadeInUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

/* input */
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="intro">✨ ĐANG TẢI DỮ LIỆU...</div>

<div id="inputScreen" style="display:none;">
  <h2>🎯 Nhập tên</h2>
  <input id="name" placeholder="VD: Nguyễn Anh Dũng">
  <button onclick="start()">BẮT ĐẦU</button>
</div>

<div id="honorScreen">
  <div class="overlay"></div>
  <div class="spotlight"></div>

  <div class="container" id="container">
    
    <div class="avatarWrap">
      <img id="avatar" class="avatar">
    </div>

    <div id="text"></div>
  </div>
</div>

<audio id="music" src="music.mp3"></audio>
<audio id="whoosh" src="whoosh.mp3"></audio>

<script>

let data = {};
let loaded = false;

function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g, " ");
}

// load data
async function loadData() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVauF5Yc50nuFu26X_7P3LeZKLVb3WFAJYycWhJSSYxEjkk6rG3fj8BUCIwyn8_pVLhvSwV2a1NDwl/pub?output=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split(/\r?\n/).slice(1);

  rows.forEach(row => {
    if (!row.trim()) return;

    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    let name = normalize(cols[0] || "");
    let title = cols[1]?.replace(/"/g, "");
    let reward = cols[2]?.replace(/"/g, "");
    let img = cols[4]?.replace(/"/g, "");

    if (!data[name]) data[name] = [];

    data[name].push({ title, reward, img });
  });

  loaded = true;

  document.getElementById("intro").style.display = "none";
  document.getElementById("inputScreen").style.display = "flex";

  createParticles();
}

loadData();

// particles
function createParticles() {
  for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(p);
  }
}

// start
async function start() {

  if (!loaded) return alert("Đang tải dữ liệu...");

  let raw = document.getElementById("name").value;
  let name = normalize(raw);

  if (!name) return alert("Nhập tên!");

  document.getElementById("inputScreen").style.display = "none";
  document.getElementById("honorScreen").style.display = "block";

  let avatar = document.getElementById("avatar");
  let text = document.getElementById("text");
  let container = document.getElementById("container");

  if (!data[name]) {
    text.innerHTML = `<div class="name">${raw}</div><div>Chưa có danh hiệu</div>`;
    return;
  }

  avatar.src = data[name][0].img || "https://i.imgur.com/1X6Yh6X.png";
  avatar.onerror = () => avatar.src = "https://i.imgur.com/1X6Yh6X.png";

  document.getElementById("music").play();
  container.classList.add("show");

  let whoosh = document.getElementById("whoosh");
  whoosh.currentTime = 0;
  whoosh.play();

  let listHTML = data[name].map((item, index) => {
    return `
      <div style="margin-top:15px; opacity:0; animation: fadeInUp 0.6s forwards; animation-delay:${index * 0.3}s">
        <div class="title">${item.title}</div>
        <div class="reward">💰 ${item.reward}</div>
      </div>
    `;
  }).join("");

  text.innerHTML = `
    <div class="name">${raw.toUpperCase()}</div>
    ${listHTML}
  `;

  startFirework();
}

// firework
function startFirework() {
  setInterval(() => {
    confetti({
      particleCount: 60,
      spread: 80,
      origin: { x: Math.random(), y: Math.random() * 0.6 }
    });
  }, 500);
}

</script>

</body>
</html>
